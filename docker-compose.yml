services:
  db:
    image: postgres:15-alpine
    container_name: docker_teste_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # O Docker injeta as variáveis do .env dentro do container do banco
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - docker_teste_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker_teste_django
    volumes:
      - ./djangoapp:/djangoapp
      - ./scripts:/scripts
      - static_volume:/data/web/static
      - media_volume:/data/web/media
    ports:
      - "8000:8000"
    # O Docker injeta as mesmas variáveis do .env aqui para o commands.sh ler
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - docker_teste_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  docker_teste_network:
    driver: bridge
